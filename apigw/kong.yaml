          - /api/storage
        strip_path: true
        methods:
          - GET
  - name: search
    url: http://searchitem-service.default.svc.cluster.local:50051/v1/search
    routes:
      - name: search
        paths:
          - /api/search
        strip_path: true
        methods:
          - GET
        plugins:
          - name: request-transformer
            config:
              remove:
                headers:
                  - Authorization
  - name: categories
    url: http://searchitem-service.default.svc.cluster.local:50051/v1/categories
    routes:
      - name: categories
        paths:
          - /api/categories
        strip_path: true
        methods:
          - GET
  - name: item-detail
    url: http://product-service.default.svc.cluster.local:50052/v1/item/detail
    routes:
      - name: get-item-detail
        paths:
