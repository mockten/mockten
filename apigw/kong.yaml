  - name: seller-stats-service
    url: http://sale-service.default.svc.cluster.local:8080/v1/seller/stats
    routes:
      - name: seller-stats-route
        paths:
          - /api/seller/stats
        strip_path: true
        methods:
          - GET
          - OPTIONS
    plugins:
      - name: request-transformer
        config:
          add:
            headers:
              - Authorization:$http_authorization

  - name: seller-orders-service
    url: http://sale-service.default.svc.cluster.local:8080/v1/seller/orders
    routes:
      - name: seller-orders-route
        paths:
          - /api/seller/orders
        strip_path: true
