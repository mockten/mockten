_format_version: "3.0"

# Global proxy-cache plugin — caches GET responses in memory
# TTL 30s for frequently-read, rarely-changing endpoints
plugins:
  - name: proxy-cache
    config:
      response_code: [200]
      request_method: [GET]
      content_type: [application/json, application/json; charset=utf-8]
      cache_ttl: 30
      strategy: memory
      cache_control: true

services:
  - name: dashboard-stats
    url: http://mockten-dashboard:3001/api/stats
    routes:
      - name: dashboard-stats-route
        paths:
          - /api/stats
        methods:
          - GET
        strip_path: true

  - name: keycloak-token
    url: http://uam-service.default.svc.cluster.local/realms/mockten-realm-dev/protocol/openid-connect/token
    routes:
      - name: keycloak-token-route
        paths:
          - /api/uam/token
        strip_path: true
        methods:
          - POST
    plugins:
      - name: request-transformer
        config:
          add:
            body:
              - client_id:mockten-react-client
              - client_secret:mockten-client-secret
              - grant_type:password
              - scope:openid profile
  - name: keycloak-creation-token
    url: http://uam-service.default.svc.cluster.local/realms/mockten-realm-dev/protocol/openid-connect/token
    routes:
      - name: keycloak-creation-token-route
        paths:
          - /api/uam/creation/token
        strip_path: true
        methods:
          - POST
    plugins:
      - name: request-transformer
        config:
          add:
            body:
              - client_id:mockten-react-client
              - client_secret:mockten-client-secret
              - grant_type:password
              - scope:openid profile
              - username:superadmin
              - password:superadmin

  - name: keycloak-userinfo
    url: http://uam-service.default.svc.cluster.local/realms/mockten-realm-dev/protocol/openid-connect/userinfo
    routes:
      - name: keycloak-userinfo-route
        paths:
          - /api/uam/userinfo
        strip_path: true
        methods:
          - GET
          - OPTIONS
  - name: keycloak-oauth
    url: http://uam-service.default.svc.cluster.local/realms/mockten-realm-dev/protocol/openid-connect/auth
    routes:
      - name: keycloak-oauth
        paths:
          - /api/uam/auth
        strip_path: true
        methods:
          - GET
          - OPTIONS
    plugins:
      - name: request-transformer
        config:
          add:
            querystring:
              - client_id:mockten-react-client
  - name: keycloak-broker-google-endpoint
    url: http://uam-service.default.svc.cluster.local/realms/mockten-realm-dev/broker/google/endpoint
    routes:
      - name: keycloak-broker-google-endpoint-route
        paths:
          - /api/uam/broker/google/endpoint
        strip_path: true
        methods:
          - GET
          - POST
  - name: keycloak-admin-users
    url: http://uam-service.default.svc.cluster.local/admin/realms/mockten-realm-dev/users
    routes:
      - name: keycloak-admin-users-route
        paths:
          - /api/uam/users
        strip_path: true
        methods:
          - GET
          - POST
          - OPTIONS
    plugins:
      - name: request-transformer
        config:
          add:
            headers:
              - Authorization:$http_authorization
          remove:
            headers:
              - host
      - name: cors
        config:
          origins: ['*']
          methods: ['POST','OPTIONS','GET']
          headers: ['Authorization', 'Content-Type']
          credentials: true

  - name: keycloak-admin-user-delete
    url: http://uam-service.default.svc.cluster.local/admin/realms/mockten-realm-dev/users
    routes:
      - name: keycloak-admin-user-delete-route
        paths:
          - ~/api/uam/users/(?<userId>[^/]+)$
        strip_path: false
        methods:
          - DELETE
          - OPTIONS
    plugins:
      - name: request-transformer
        config:
          replace:
            uri: /admin/realms/mockten-realm-dev/users/$(uri_captures["userId"])
          add:
            headers:
              - Authorization:$http_authorization
          remove:
            headers:
              - host
      - name: cors
        config:
          origins: ['*']
          methods: ['DELETE','OPTIONS']
          headers: ['Authorization', 'Content-Type']
          credentials: true

  - name: keycloak-execute-actions-email
    url: http://uam-service.default.svc.cluster.local/admin/realms/mockten-realm-dev/users
    routes:
      - name: keycloak-execute-actions-email-route
        paths:
          - ~/api/uam/users/(?<userId>[^/]+)/execute-actions-email
        strip_path: false
        methods:
          - PUT
          - OPTIONS
    plugins:
      - name: request-transformer
        config:
          add:
            headers:
              - Authorization:$http_authorization
          remove:
            headers:
              - host
      - name: cors
        config:
          origins: ['*']
          methods: ['PUT','OPTIONS']
          headers: ['Authorization', 'Content-Type']
          credentials: true

  - name: keycloak-admin-roles
    url: http://uam-service.default.svc.cluster.local/admin/realms/mockten-realm-dev/roles
    routes:
      - name: keycloak-admin-roles-route
        paths:
          - /api/uam/roles
        strip_path: true
        methods:
          - OPTIONS
          - GET
    plugins:
      - name: request-transformer
        config:
          add:
            headers:
              - Authorization:$http_authorization
          remove:
            headers:
              - host
      - name: cors
        config:
          origins: ['*']
          headers: ['Authorization', 'Content-Type']
          credentials: true
  - name: minio-access
    url: http://minio-service.default.svc.cluster.local:9000/photos
    routes:
      - name: minio-access-route
