  - name: review-submit
    url: http://product-service.default.svc.cluster.local:50052/v1/item/review
    routes:
      - name: review-submit
        paths:
          - /api/item/review
        strip_path: true
        methods:
          - POST
  - name: browsing-history-service
    url: http://product-service.default.svc.cluster.local:50052
    routes:
      - name: record-browsing-history
        paths:
          - ~/api/browsing-history/([^/]+)$
        methods:
          - POST
        strip_path: false
        plugins:
          - name: request-transformer
            config:
              replace:
                uri: "/v1/browsing-history/$(uri_captures[1])"
      - name: get-co-purchase
        paths: [ /api/co-purchase ]
        methods: [ GET ]
        strip_path: false
        plugins:
          - name: request-transformer
            config:
              replace:
                uri: /v1/co-purchase
      - name: get-browsing-history-recommendations
        paths:
          - /api/browsing-history/recommendations
        methods:
          - GET
        strip_path: false
        plugins:
          - name: request-transformer
            config:
              replace:
                uri: /v1/browsing-history/recommendations

  - name: favorite-service
    url: http://product-service.default.svc.cluster.local:50052
    routes:
      - name: get-favorites
        paths: [ /api/fav ]
        methods: [ GET ]
        strip_path: false
        plugins:
          - name: request-transformer
            config:
              replace:
                uri: /v1/fav
      - name: add-favorite
        paths:
          - ~/api/fav/([^/]+)$
        methods:
          - POST
        strip_path: false
        plugins:
          - name: request-transformer
            config:
              replace:
                uri: "/v1/fav/$(uri_captures[1])"
      - name: remove-favorite
        paths:
          - ~/api/fav/([^/]+)$
        methods:
