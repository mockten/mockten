worker_processes 1;
events { worker_connections 1024; }

http {
    server_tokens off;

    server {
        listen 80;
        client_max_body_size 100m;

        # Docker's internal DNS — resolve upstreams at request time, not startup
        resolver 127.0.0.11 valid=10s;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # to React
        location / {
            proxy_pass http://host.docker.internal:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }

        # To Kong (apigw)
        location /api/test/auth-backdoor {
            proxy_pass http://host.docker.internal:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            set $apigw http://apigw:8082;
            proxy_pass $apigw;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        # To Keycloak (uam)
        location /realms/mockten-realm-dev/broker/ {
            set $uam http://uam-service.default.svc.cluster.local;
            proxy_pass $uam;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /realms/mockten-realm-dev/login-actions/ {
            set $uam http://uam-service.default.svc.cluster.local;
            proxy_pass $uam;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # To mockten monitoring dashboard
        location /dashboard/ {
            set $dashboard http://mockten-dashboard:3001;
            rewrite ^/dashboard/(.*) /$1 break;
            proxy_pass $dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket support for log streaming
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            # CI pipeline / E2E runs can take >60s — extend timeouts
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}