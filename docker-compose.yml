version: "3.8"

services:
  mysql:
    container_name: mysql-service.default.svc.cluster.local
    image: mockten-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mocktendb
      MYSQL_USER: mocktenusr
      MYSQL_PASSWORD: mocktenpassword
    networks:
      - mockten_nw
    ports:
      - "3306:3306"

  redis:
    container_name: redis-service.default.svc.cluster.local
    image: mockten-redis
    networks:
      - mockten_nw
    ports:
      - "6379:6379"

  uam:
    container_name: uam-service.default.svc.cluster.local
    image: uam
    platform: linux/amd64
    environment:
      KC_HOSTNAME: localhost
      DEV_MODE: "true"
    networks:
      - mockten_nw
    tty: true
    stdin_open: true

  minio:
    container_name: minio-service.default.svc.cluster.local
    image: minio
    networks:
      - mockten_nw
    ports:
      - "9000:9000"
      - "9001:9001"
    tty: true
    stdin_open: true

  apigw:
    container_name: apigw
    image: apigw
    networks:
      - mockten_nw
    ports:
      - "8082:8082"
      - "8001:8001"
      - "8002:8002"
    tty: true
    stdin_open: true
    environment:
      KONG_NGINX_HTTP_LOG_FORMAT: "with_rt '$$remote_addr - $$remote_user [$$time_local] \"$$request\" $$status $$body_bytes_sent rt=$$upstream_response_time kong_request_id: \"$$kong_request_id\"'"
      KONG_PROXY_ACCESS_LOG: "/tmp/access.log with_rt"

  meilisearch:
    container_name: meilisearch-service.default.svc.cluster.local
    image: meilisearch
    networks:
      - mockten_nw
    ports:
      - "7700:7700"
    tty: true
    stdin_open: true

  searchitem:
    container_name: searchitem-service.default.svc.cluster.local
    image: searchitem
    networks:
      - mockten_nw
    ports:
      - "50051:50051"
    tty: true
    stdin_open: true

  product:
    container_name: product-service.default.svc.cluster.local
    image: product
    networks:
      - mockten_nw
    ports:
      - "50052:50052"
    tty: true
    stdin_open: true

  cart:
    container_name: cart-service.default.svc.cluster.local
    image: cart
    networks:
      - mockten_nw
    ports:
      - "50053:50053"
    tty: true
    stdin_open: true

  sync:
    container_name: mockten-sync
    image: mockten-sync
    networks:
      - mockten_nw
    tty: true
    stdin_open: true

  geocoding:
    container_name: geocoding-service.default.svc.cluster.local
    image: mockten-geocoding
    volumes:
      - ./geocoding/config.json:/app/config.json:ro
    networks:
      - mockten_nw

  ecpay:
    container_name: ecpay-service.default.svc.cluster.local
    image: mockten-ecpay
    environment:
      SecretKeyString: ${STRIPE_SECRET_KEY}
      MysqlUser: mocktenusr
      MysqlPassword: mocktenpassword
      DbHost: mysql-service.default.svc.cluster.local:3306
      MysqlDB: mocktendb
      RANKING_SERVICE_URL: http://ranking-service.default.svc.cluster.local:8080
    networks:
      - mockten_nw

  ranking:
    container_name: ranking-service.default.svc.cluster.local
    image: mockten-ranking
    environment:
      REDIS_HOST: redis-service.default.svc.cluster.local:6379
      MYSQL_DSN: mocktenusr:mocktenpassword@tcp(mysql-service.default.svc.cluster.local:3306)/mocktendb?parseTime=true
    networks:
      - mockten_nw

  sale:
    container_name: sale-service.default.svc.cluster.local
    image: mockten-sale
    environment:
      MYSQL_DSN: mocktenusr:mocktenpassword@tcp(mysql-service.default.svc.cluster.local:3306)/mocktendb?parseTime=true
      MEILI_SVC: meilisearch-service.default.svc.cluster.local
    networks:
      - mockten_nw

  shipment:
    container_name: shipment-service.default.svc.cluster.local
    image: mockten-shipment
    environment:
      TEST_MODE: "true"
      TICK_INTERVAL_SECONDS: 200
      MYSQL_DSN: mocktenusr:mocktenpassword@tcp(mysql-service.default.svc.cluster.local:3306)/mocktendb?parseTime=true
    networks:
      - mockten_nw

  recommendation:
    container_name: recommendation-service.default.svc.cluster.local
    image: mockten-recommendation
    environment:
      MYSQL_HOST: mysql-service.default.svc.cluster.local
      MINIO_ENDPOINT: minio-service.default.svc.cluster.local:9000
      RANKING_SERVICE_URL: http://ranking-service.default.svc.cluster.local:8080
    networks:
      - mockten_nw

  nginx:
    container_name: nginx
    image: nginx
    volumes:
      - ./dev_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - mockten_nw
    tty: true
    stdin_open: true

  mongodb:
    container_name: mongo-service.default.svc.cluster.local
    image: mockten-mongodb
    build:
      context: ./mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: bar
      MONGO_INITDB_ROOT_PASSWORD: bar
    networks:
      - mockten_nw
    ports:
      - "27017:27017"

  # ── Monitoring Stack ──────────────────────────────────────────────────────
  dashboard:
    container_name: mockten-dashboard
    image: mockten-dashboard
    build:
      context: ./monitoring/dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ecfront2.log:/app/ecfront2.log:ro
      - ./apigw/kong.yaml:/app/kong.yaml:ro
      - ./uam/realm-export-dev.json:/app/realm-export-dev.json:ro
      - ./ecfront2/tests:/app/tests:ro
      - ./ecfront2:/app/ecfront2
      - ./Taskfile.yaml:/app/Taskfile.yaml:ro
      - ./.github/workflows/ci.yml:/app/.github/workflows/ci.yml:ro
      - ./:${HOST_WORKSPACE_PATH:-${PWD}}
    environment:
      - HOST_WORKSPACE_PATH=${HOST_WORKSPACE_PATH:-${PWD}}
    networks:
      - mockten_nw

  # ── Airflow Stack ─────────────────────────────────────────────────────────
  airflow-postgres:
    container_name: airflow-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    networks:
      - mockten_nw
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10

  airflow-webserver:
    container_name: airflow-webserver
    image: mockten-airflow
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    command: ["airflow", "webserver"]
    ports:
      - "8085:8080"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: "j7zLQ3S9kBh2vXpNqWcYeRaFmTuGdIoK8sE4wPlZnJy0="
      AIRFLOW__WEBSERVER__SECRET_KEY: "mockten-airflow-secret"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      MYSQL_HOST: mysql-service.default.svc.cluster.local
      MINIO_ENDPOINT: minio-service.default.svc.cluster.local:9000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    networks:
      - mockten_nw

  airflow-scheduler:
    container_name: airflow-scheduler
    image: mockten-airflow
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    command: ["airflow", "scheduler"]
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: "j7zLQ3S9kBh2vXpNqWcYeRaFmTuGdIoK8sE4wPlZnJy0="
      AIRFLOW__WEBSERVER__SECRET_KEY: "mockten-airflow-secret"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      MYSQL_HOST: mysql-service.default.svc.cluster.local
      MINIO_ENDPOINT: minio-service.default.svc.cluster.local:9000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    networks:
      - mockten_nw

networks:
  mockten_nw:
    name: mockten_nw

volumes:
  airflow-postgres-data:

