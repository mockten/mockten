  e2e_tests:
    if: ${{ github.actor != 'nektos/act' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v1



      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install go-task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Install Python dependencies
        run: |
          pip3 install -r mysql/seeder/requirements.txt || pip install -r mysql/seeder/requirements.txt

      - name: Install Frontend dependencies
        run: |
          cd ecfront2
          npm install

      - name: Build all microservice containers
        run: task setup

      - name: Install lsof
        run: sudo apt-get update && sudo apt-get install -y lsof

      - name: Create .env for Stripe test key
        run: echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" > .env

      - name: Start services and frontend
        run: task build
        env:
          HOST_WORKSPACE_PATH: ${{ github.workspace }}

      - name: Install Playwright Browsers
        run: |
          cd ecfront2
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: task e2e

      - name: Upload Playwright Report
        if: always() && env.ACTIONS_RUNTIME_TOKEN != ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ecfront2/playwright-report/
          retention-days: 30