    steps:
      - uses: actions/checkout@v1
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Init module (only on CI)
        run: |
          if [ ! -f go.mod ]; then
            go mod init github.com/${{ github.repository }}/geocoding
            go get github.com/go-sql-driver/mysql@v1.8.1
            go mod tidy
          fi
      - name: Build
